<!DOCTYPE html>
<html lang="hr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SharkHunter | Ultimate Deal Finder</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Outfit:wght@300;400;600&display=swap"
        rel="stylesheet">
    <meta name="theme-color" content="#050b14">
</head>

<body>
    <div class="glass-bg"></div>

    <header>
        <div class="header-content">
            <h1 class="retro-title">SHARK<span>HUNTER</span></h1>
            <div style="display: flex; align-items: center; gap: 10px;">
                <button id="btn-refresh" class="chip" title="Osvježi podatke">🔄</button>
                <div class="status-badge" id="scan-status">SCANNING</div>
            </div>
        </div>
    </header>

    <main id="app-container">
        <!-- Dashboard: Radar View -->
        <div id="view-radar">
            <section class="radar-section">
                <div class="radar-circle outer"></div>
                <div class="radar-circle inner"></div>
                <div class="radar-circle core"></div>
                <div class="radar-cross"></div>
                <div class="radar-sweep"></div>
                <!-- Dynamic Pulse Points will appear here -->
                <div id="radar-hit-container"></div>
            </section>

            <div class="section-header">
                <h2 class="sub-title">AKTIVNE <span>MISIJE</span></h2>
            </div>

            <div class="dashboard-grid" id="missions-grid">
                <!-- Missions will be injected by app.js -->
            </div>
        </div>

        <!-- Dashboard: Prey View [NEW] -->
        <div id="view-plijen" class="hidden">
            <div class="section-header">
                <h2 class="sub-title">PRONAĐENI <span>PLIJEN</span></h2>
                <div class="filter-chips">
                    <button class="chip active" data-filter="all">Sve</button>
                    <button class="chip" data-filter="auto">Auti</button>
                    <button class="chip" data-filter="nekretnina">Stanovi</button>
                </div>
            </div>

            <div class="dashboard-grid" id="prey-grid">
                <!-- Discovered prey will be injected by app.js -->
            </div>
        </div>

        <button class="btn-add" id="btn-new-mission">+</button>
    </main>

    <!-- Modal: New Mission -->
    <div id="modal-mission" class="modal hidden">
        <div class="modal-content">
            <!-- Form injected by app.js -->
        </div>
    </div>

    <nav class="tab-bar">
        <button class="tab-btn active" data-view="radar">
            <span class="icon">📡</span>
            <span class="label">Radar</span>
        </button>
        <button class="tab-btn" data-view="plijen">
            <div class="nav-icon-wrapper">
                <span class="icon">🦈</span>
                <span class="badge" id="prey-count">0</span>
            </div>
            <span class="label">Plijen</span>
        </button>
        <button class="tab-btn" data-view="postavke">
            <span class="icon">⚙️</span>
            <span class="label">Postavke</span>
        </button>
    </nav>

    <script src="app.js"></script>
</body>

</html>
